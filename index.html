<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
    <link rel="canonical" href="https://talent-ia.com/">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talent-ia | Tecnología que acorta distancias</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{--navy:#0F1F3D;--gold:#C8A96E;--gold-light:#DFC08A;--cream:#F5F0E8;--white:#FFFFFF;--gray:#8A9AB5;--text:#1A2E4A;--text-light:#4A5D75;}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden;}


/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1.1rem 4rem;background:rgba(15,31,61,0.97);backdrop-filter:blur(16px);border-bottom:1px solid rgba(200,169,110,0.18);}
.nav-logo{display:flex;align-items:center;gap:.7rem;text-decoration:none;}
.nav-logo svg{height:34px;width:auto;}
.nav-logo-text{font-family:'DM Serif Display',serif;font-size:1.5rem;color:#fff;letter-spacing:-.02em;}
.nav-logo-text span{color:var(--gold);font-style:italic;}
.nav-links{display:flex;gap:2.5rem;list-style:none;}
.nav-links a{color:rgba(255,255,255,.72);text-decoration:none;font-size:.82rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;transition:color .25s;}
.nav-links a:hover{color:var(--gold);}
.nav-cta{background:var(--gold)!important;color:var(--navy)!important;padding:.55rem 1.4rem;border-radius:2px;font-weight:600!important;}
.nav-cta:hover{background:var(--gold-light)!important;}


/* HERO */
.hero{min-height:100vh;background:var(--navy);position:relative;display:flex;align-items:center;overflow:hidden;}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 75% 45%,rgba(200,169,110,.09) 0%,transparent 65%),radial-gradient(ellipse 40% 50% at 15% 75%,rgba(200,169,110,.05) 0%,transparent 55%);}
.hero-grid-lines{position:absolute;inset:0;opacity:.035;background-image:linear-gradient(var(--gold) 1px,transparent 1px),linear-gradient(90deg,var(--gold) 1px,transparent 1px);background-size:64px 64px;}
.hero-content{position:relative;z-index:2;max-width:1100px;margin:0 auto;padding:9rem 4rem 6rem;display:grid;grid-template-columns:1.15fr .85fr;gap:5rem;align-items:center;}
.hero-tag{display:inline-flex;align-items:center;gap:.6rem;color:var(--gold);font-size:.75rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;margin-bottom:1.4rem;}
.hero-tag::before{content:'';width:24px;height:1px;background:var(--gold);}
.hero h1{font-family:'DM Serif Display',serif;font-size:clamp(2.8rem,4.8vw,4.2rem);color:#fff;line-height:1.08;letter-spacing:-.025em;margin-bottom:1.5rem;}
.hero h1 em{font-style:italic;color:var(--gold);}
.hero-desc{color:rgba(255,255,255,.62);font-size:1.05rem;line-height:1.8;margin-bottom:2.5rem;max-width:460px;}
